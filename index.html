<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smiski Leadership Quiz</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* MAIN CARD */
.card {
  width: 90%;
  max-width: 520px;
  padding: 30px;
  border-radius: 24px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  box-shadow: 0 0 40px rgba(34,197,94,0.15);
  text-align: center;
  animation: fadeIn 0.6s ease;
}

/* TITLE */
h1 {
  font-size: 26px;
  margin-bottom: 5px;
}

.subtitle {
  font-size: 14px;
  color: #94a3b8;
  margin-bottom: 20px;
}

/* PROGRESS BAR */
.progress {
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  margin-bottom: 25px;
}

.progress-bar {
  height: 6px;
  background: linear-gradient(90deg,#22c55e,#4ade80);
  width: 0%;
  border-radius: 10px;
  transition: 0.3s;
}

/* QUESTION */
#question {
  font-size: 20px;
  margin-bottom: 20px;
}

/* BUTTONS */
button {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 14px;
  border-radius: 999px;
  border: none;
  font-size: 15px;
  cursor: pointer;
  background: rgba(255,255,255,0.08);
  color: white;
  transition: all 0.25s ease;
}

button:hover {
  background: #22c55e;
  color: black;
  transform: scale(1.03);
}

/* RESULT CARD */
.result-card {
  display: none;
  margin-top: 20px;
  animation: fadeIn 0.6s ease;
}

.smiski-img {
  width: 140px;
  margin-bottom: 15px;
  filter: drop-shadow(0 0 20px #86efac);
}

.result-title {
  font-size: 22px;
  margin-bottom: 10px;
}

.result-text {
  font-size: 14px;
  color: #cbd5f5;
  margin-bottom: 8px;
}

/* RESTART */
.restart {
  margin-top: 20px;
  background: #22c55e;
  color: black;
  font-weight: bold;
}

/* ANIMATION */
@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}

</style>
</head>

<body>

<div class="card">

  <h1>Which Smiski Leader Are You?</h1>
  <div class="subtitle">No right answers — just vibes 👀</div>

  <div class="progress">
    <div id="bar" class="progress-bar"></div>
  </div>

  <div id="quizContent">
    <div id="question"></div>
    <div id="answers"></div>
  </div>

  <div id="resultCard" class="result-card">
    <img id="smiskiImg" class="smiski-img">
    <div class="result-title" id="smiskiTitle"></div>
    <div class="result-text" id="smiskiDesc"></div>
    <div class="result-text" id="smiskiLeader"></div>
    <div class="result-text" id="smiskiStrength"></div>
    <div class="result-text" id="smiskiGrowth"></div>
    <div class="result-text" id="smiskiReflect"></div>

    <button class="restart" onclick="restartQuiz()">Restart</button>
  </div>

</div>

<script>

/* QUESTIONS (same as yours) */
const quiz = [
{q:"Your team event is tomorrow, but things are messy…",
a:[
["You step in and organise everything clearly","model"],
["You remind everyone why this matters","vision"],
["You suggest changing the plan","challenge"],
["You check in with each teammate","enable"],
["You hype everyone up","encourage"]
]},
{q:"A teammate is not contributing much…",
a:[
["You show them what needs to be done","model"],
["You remind them of the bigger purpose","vision"],
["You suggest a different way they can help","challenge"],
["You work alongside them","enable"],
["You encourage them gently","encourage"]
]},
{q:"Your group has no clear direction…",
a:[
["You create structure","model"],
["You paint a picture of success","vision"],
["You propose a new approach","challenge"],
["You get everyone’s input","enable"],
["You keep morale positive","encourage"]
]},
{q:"Something goes wrong during your project…",
a:[
["You take responsibility","model"],
["You reframe it positively","vision"],
["You try something different","challenge"],
["You support teammates","enable"],
["You encourage everyone","encourage"]
]},
{q:"In discussions, you usually…",
a:[
["Keep things focused","model"],
["Share ideas","vision"],
["Question assumptions","challenge"],
["Make sure everyone speaks","enable"],
["Affirm others","encourage"]
]},
{q:"A quiet teammate has a good idea…",
a:[
["You build on it","model"],
["You highlight its potential","vision"],
["You improve it further","challenge"],
["You invite them to share","enable"],
["You affirm them","encourage"]
]},
{q:"You feel most satisfied when…",
a:[
["Things are done well","model"],
["People feel inspired","vision"],
["Something new works","challenge"],
["The team works smoothly","enable"],
["People feel appreciated","encourage"]
]},
{q:"You struggle most with teammates who…",
a:[
["Don’t take responsibility","model"],
["Lack passion","vision"],
["Resist change","challenge"],
["Don’t cooperate","enable"],
["Bring others down","encourage"]
]},
{q:"If no one leads…",
a:[
["You step up quietly","model"],
["You guide direction","vision"],
["You shake things up","challenge"],
["You bring people together","enable"],
["You keep morale up","encourage"]
]},
{q:"Your biggest impact is…",
a:[
["Setting standards","model"],
["Giving meaning","vision"],
["Driving change","challenge"],
["Building trust","enable"],
["Encouraging others","encourage"]
]}
];

/* RESULTS (UPDATED IMAGES) */
const results = {
model:{
img:"https://smiski.com/e/wp-content/uploads/2024/01/balancing-boxes.png",
title:"🧍 The Carrying Smiski",
desc:"You lead through action — not words.",
leader:"Leadership Style: Model the Way",
strength:"✨ You set strong standards and take responsibility.",
growth:"⚠️ You may expect others to just ‘know’ what to do.",
reflect:"💭 Do you clearly communicate expectations?"
},
vision:{
img:"https://smiski.com/e/wp-content/uploads/2025/09/img_birthday03.png",
title:"🎉 The Celebration Smiski",
desc:"You inspire people with possibilities.",
leader:"Leadership Style: Inspire a Shared Vision",
strength:"✨ You bring energy and direction.",
growth:"⚠️ Ideas may lack follow-through.",
reflect:"💭 How do you turn ideas into action?"
},
challenge:{
img:"https://smiski.com/e/wp-content/uploads/2023/05/img_aerobics.png",
title:"🤸 The Stretching Smiski",
desc:"You push for better and challenge norms.",
leader:"Leadership Style: Challenge the Process",
strength:"✨ You drive innovation.",
growth:"⚠️ Not everything needs changing.",
reflect:"💭 When should you adapt vs disrupt?"
},
enable:{
img:"https://smiski.com/e/wp-content/uploads/2024/01/teamwork.png",
title:"🤝 The Teamwork Smiski",
desc:"You bring people together.",
leader:"Leadership Style: Enable Others to Act",
strength:"✨ You build trust.",
growth:"⚠️ You may hold yourself back.",
reflect:"💭 When should you step forward?"
},
encourage:{
img:"https://smiski.com/e/wp-content/uploads/2020/12/img_cheer_05.png",
title:"💛 The Cheer Smiski",
desc:"You uplift those around you.",
leader:"Leadership Style: Encourage the Heart",
strength:"✨ You create positivity.",
growth:"⚠️ You may avoid tough conversations.",
reflect:"💭 When should you be honest, not just kind?"
}
};

let index=0;
let scores={model:0,vision:0,challenge:0,enable:0,encourage:0};

function loadQ(){
  let q=quiz[index];
  question.innerText=q.q;

  answers.innerHTML="";
  q.a.forEach(ans=>{
    let btn=document.createElement("button");
    btn.innerText=ans[0];
    btn.onclick=()=>answer(ans[1]);
    answers.appendChild(btn);
  });

  bar.style.width=(index/quiz.length)*100+"%";
}

function answer(type){
  scores[type]++;
  index++;
  if(index<quiz.length){loadQ();}
  else{showResult();}
}

function showResult(){
  let top=Object.keys(scores).reduce((a,b)=>scores[a]>scores[b]?a:b);

  quizContent.style.display="none";
  resultCard.style.display="block";

  smiskiImg.src=results[top].img;
  smiskiTitle.innerText=results[top].title;
  smiskiDesc.innerText=results[top].desc;
  smiskiLeader.innerText=results[top].leader;
  smiskiStrength.innerText=results[top].strength;
  smiskiGrowth.innerText=results[top].growth;
  smiskiReflect.innerText=results[top].reflect;

  bar.style.width="100%";
}

function restartQuiz(){
  index=0;
  scores={model:0,vision:0,challenge:0,enable:0,encourage:0};
  resultCard.style.display="none";
  quizContent.style.display="block";
  loadQ();
}

loadQ();

</script>

</body>
</html>
