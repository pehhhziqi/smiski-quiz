<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smiski Quiz</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* 🌿 LANDING */
.landing {
  background: white;
  min-height: 100vh;
  text-align: center;
  padding: 20px;
}

.landing img {
  width: 100%;
  height: auto;
}

.landing h1 {
  margin-top: 20px;
  font-size: 26px;
}

.landing p {
  font-size: 14px;
  color: #555;
  line-height: 1.6;
}

.start-btn {
  margin-top: 20px;
  padding: 14px;
  border-radius: 999px;
  border: none;
  background: #22c55e;
  color: white;
  font-size: 16px;
}

/* 🌌 QUIZ */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('bg.png') center/cover no-repeat;
  z-index: -2;
}

.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: -1;
}

/* ✨ PARTICLES */
.particle {
  position: fixed;
  width: 5px;
  height: 5px;
  background: #d9f99d;
  border-radius: 50%;
  opacity: 0.7;
  animation: float 10s linear infinite;
}

@keyframes float {
  from {transform: translateY(100vh);}
  to {transform: translateY(-10vh);}
}

/* CARD */
.container {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  width: 90%;
  max-width: 400px;
  padding: 20px;
  border-radius: 20px;
  background: rgba(0,0,0,0.6);
  color: white;
  text-align: center;
  backdrop-filter: blur(10px);
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 999px;
  border: none;
  background: #22c55e;
  color: black;
  font-weight: bold;
}

/* ANSWERS */
.answer {
  background: rgba(255,255,255,0.1);
  color: white;
}

.answer:hover {
  background: #22c55e;
  color: black;
}

/* PROGRESS */
.progress {
  height: 5px;
  background: rgba(255,255,255,0.2);
  margin-bottom: 10px;
}

.bar {
  height: 5px;
  background: #22c55e;
  width: 0%;
}

.hidden {
  display: none;
}

</style>
</head>

<body>

<!-- 🌿 LANDING -->
<div id="landing" class="landing">
  <img src="landing.png">
  <h1>Discover your Smiski type</h1>
  <p>
    Step into a quiet, glowing world where tiny Smiskis observe how people think, act, and respond…<br><br>
    Through your choices, uncover what kind of Smiski you might be.
  </p>
  <button class="start-btn" onclick="startQuizUI()">Take the Quiz</button>
</div>

<!-- 🌌 QUIZ UI -->
<div id="quizUI" class="hidden">

<div class="bg"></div>
<div class="overlay"></div>

<script>
for(let i=0;i<40;i++){
  let p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"%";
  document.body.appendChild(p);
}
</script>

<div class="container">

<!-- STORY -->
<div id="story" class="card">
  <p>
    You notice a soft glow…<br><br>
    Small figures appear.<br><br>
    Smiskis.<br><br>
    <i>"Let us show you who you are."</i>
  </p>
  <button onclick="startQuiz()">Begin</button>
</div>

<!-- QUIZ -->
<div id="quizBox" class="card hidden">
  <div class="progress"><div id="bar" class="bar"></div></div>
  <h3 id="q"></h3>
  <div id="ans"></div>
</div>

<!-- RESULT -->
<div id="result" class="card hidden">
  <img id="img" style="width:150px">
  <h2 id="title"></h2>
  <button onclick="location.reload()">Restart</button>
</div>

</div>
</div>

<script>

/* NAV */
function startQuizUI(){
  landing.classList.add("hidden");
  quizUI.classList.remove("hidden");
}

function startQuiz(){
  story.classList.add("hidden");
  quizBox.classList.remove("hidden");
  loadQ();
}

/* QUESTIONS */
const quiz=[ ... ];
// (same as before, keep your existing array)

/* RESULTS IMAGES */
const results={
model:{img:"https://drive.google.com/uc?export=view&id=13kISuLazPHIAAyv5lFkcccu8MIPNMm-h",title:"Model the Way"},
vision:{img:"https://drive.google.com/uc?export=view&id=18RYRORBh42t-X2RSBadGXFODc1_sPQKB",title:"Inspire a Shared Vision"},
challenge:{img:"https://drive.google.com/uc?export=view&id=15dH2_2t5Yc696KdCDo-U7y1DnuW-tz2J",title:"Challenge the Process"},
enable:{img:"https://drive.google.com/uc?export=view&id=1c0fRjCtUPz46IxDlbd_omEYgrUvfy_bN",title:"Enable Others to Act"},
encourage:{img:"https://drive.google.com/uc?export=view&id=1hZuIzmouaoyMJ5FBOyNCfkB1iWg6OzYe",title:"Encourage the Heart"}
};

let i=0;
let score={model:0,vision:0,challenge:0,enable:0,encourage:0};

function loadQ(){
  let cur=quiz[i];
  q.innerText=cur.q;
  ans.innerHTML="";
  cur.a.forEach(a=>{
    let b=document.createElement("button");
    b.className="answer";
    b.innerText=a[0];
    b.onclick=()=>pick(a[1]);
    ans.appendChild(b);
  });
  bar.style.width=(i/quiz.length)*100+"%";
}

function pick(type){
  score[type]++;
  i++;
  if(i<quiz.length){loadQ();}
  else{showResult();}
}

function showResult(){
  quizBox.classList.add("hidden");
  result.classList.remove("hidden");

  let top=Object.keys(score).reduce((a,b)=>score[a]>score[b]?a:b);
  img.src=results[top].img;
  title.innerText=results[top].title;
}

</script>

</body>
</html>
